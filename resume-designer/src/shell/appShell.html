  <div class="app">
    <!-- Header Bar -->
    <!-- Acts as the custom (overlay) titlebar / window-drag handle. Dragging is
         wired in JS via src/tauriDrag.js (a synchronous mousedown →
         startDragging() handler) rather than the declarative
         data-tauri-drag-region attribute, which is unreliable in Tauri v2
         (tauri-apps/tauri#9901). Interactive descendants stay clickable because
         the handler skips events whose target is inside a control. The inert
         `-webkit-app-region` CSS in main.css is a harmless no-op in WKWebView. -->
    <header class="header-bar" id="header-bar">
      <!-- Empty placeholder: React portals Header.jsx into this element, and
           tauriDrag.js attaches the window-drag region to it. -->
    </header>
    
    <!-- Main Content Area -->
    <div class="app-content">
      <!-- Left Panel: AI Chat — React owns the interior (components/chat/ChatPanel.jsx) -->
      <aside class="chat-panel closed" id="chat-panel"></aside>
      
      <!-- Center: Resume Preview -->
      <main class="preview-area" id="preview-area">
        <!-- Zoom Controls -->
        <div class="zoom-controls" id="zoom-controls">
          <div class="zoom-group">
          <button class="zoom-btn" id="zoom-out" title="Zoom Out">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
              <line x1="8" y1="11" x2="14" y2="11"/>
            </svg>
          </button>
          <div class="zoom-level" id="zoom-level">100%</div>
          <button class="zoom-btn" id="zoom-in" title="Zoom In">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
              <line x1="11" y1="8" x2="11" y2="14"/>
              <line x1="8" y1="11" x2="14" y2="11"/>
            </svg>
          </button>
          <button class="zoom-btn" id="zoom-fit" title="Fit to View">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
            </svg>
          </button>
          <button class="zoom-btn" id="zoom-reset" title="Reset to 100%">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 4v6h6"/>
              <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
            </svg>
          </button>
          <div class="zoom-divider"></div>
          <button class="zoom-btn" id="undo-btn" title="Undo (Ctrl+Z)" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 7v6h6"/>
              <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/>
            </svg>
          </button>
          <button class="zoom-btn" id="redo-btn" title="Redo (Ctrl+Y)" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 7v6h-6"/>
              <path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/>
            </svg>
          </button>
          </div>
          <div class="zoom-divider"></div>
          <div class="text-tools" id="text-tools">
            <button class="zoom-btn text-tool-btn" id="text-size-decrease" title="Decrease Font Size">
              <span class="text-tool-label">A-</span>
            </button>
            <div class="zoom-level text-size-level" id="text-size-level" title="Global text size">100%</div>
            <button class="zoom-btn text-tool-btn" id="text-size-increase" title="Increase Font Size">
              <span class="text-tool-label">A+</span>
            </button>
            <button class="zoom-btn text-tool-btn" id="text-bold" title="Bold">
              <strong>B</strong>
            </button>
            <button class="zoom-btn text-tool-btn" id="text-italic" title="Italic">
              <em>I</em>
            </button>
            <button class="zoom-btn text-tool-btn" id="text-underline" title="Underline">
              <span class="text-tool-underline">U</span>
            </button>
            <button class="zoom-btn text-tool-btn" id="text-bullets" title="Toggle Bulleted List">
              <span class="text-tool-label">•</span>
            </button>
            <button class="zoom-btn text-tool-btn" id="text-clear-format" title="Clear Formatting">
              <span class="text-tool-label">Tx</span>
            </button>
          </div>
        </div>
        
        <div class="resume-scroller" id="resume-scroller">
          <div class="resume-container" id="resume-container">
            <div class="resume" id="resume">
              <!-- Resume content rendered here -->
            </div>
          </div>
        </div>
        
        <!-- Edit mode indicator -->
        <div class="edit-mode-hint" id="edit-hint">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
          </svg>
          Click any text to edit
        </div>
      </main>
      
      <!-- Right Panel: Structure Editor -->
      <aside class="structure-panel" id="structure-panel">
        <div class="structure-panel-header">
          <h2 class="structure-panel-title">Edit Resume</h2>
          <button class="structure-panel-close" id="close-structure-panel" title="Close panel">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="structure-panel-content" id="structure-panel-content">
          <!-- Rendered by structurePanel.js -->
        </div>
      </aside>
      
      <!-- Toggle button for chat panel -->
      <button class="chat-panel-toggle" id="toggle-chat-panel" title="AI Assistant">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span class="chat-toggle-indicator" id="chat-toggle-indicator"></span>
      </button>
      
      <!-- Toggle button for structure panel -->
      <button class="structure-panel-toggle" id="toggle-structure-panel" title="Edit structure">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <line x1="9" y1="3" x2="9" y2="21"/>
          <line x1="9" y1="9" x2="21" y2="9"/>
          <line x1="9" y1="15" x2="21" y2="15"/>
        </svg>
      </button>
    </div>
    
    <!-- Hidden PDF export button (for programmatic triggering) -->
    <button id="download-pdf" hidden></button>
  </div>
