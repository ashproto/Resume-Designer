<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Designer — Colleen Sinclair</title>
  <!-- Liquid-glass opt-in. MUST run before the stylesheets below so the
       <html>/<body> background is transparent from the first paint — otherwise
       the opaque theme background flashes for a frame before the JS bundle
       loads, hiding the macOS vibrancy. Tauri injects its runtime globals at
       document-start, so this classic (non-module) script can detect the shell
       synchronously here. `?translucent` forces it on in a plain browser for
       CSS previewing; the hidden `?print=1` PDF-capture window is excluded so
       the captured resume keeps a solid background.

       SECURITY: the desktop CSP allowlists this inline script by its SHA-256 hash
       (not 'unsafe-inline'); if you change the script below, recompute the hash and
       update script-src in src-tauri/tauri.conf.json — see TAURI.md "Content Security
       Policy". -->
  <script>
    (function () {
      try {
        var params = new URLSearchParams(window.location.search);
        if (params.has('print')) return; // PDF-capture window stays opaque
        var inTauri =
          'isTauri' in window ||
          '__TAURI_INTERNALS__' in window ||
          '__TAURI__' in window;
        if (inTauri || params.has('translucent')) {
          document.documentElement.setAttribute('data-tauri', 'true');
        }
      } catch (_) {
        /* never block boot on detection */
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/main.css">
  <link rel="stylesheet" href="/styles/resume.css">
  <link rel="stylesheet" href="/styles/editor.css">
  <link rel="stylesheet" href="/styles/chat.css">
  <link rel="stylesheet" href="/styles/diff.css">
  <link rel="stylesheet" href="/styles/jobDescriptions.css">
  <link rel="stylesheet" href="/styles/onboarding.css">
  <link rel="stylesheet" href="/styles/history.css">
  <link rel="stylesheet" href="/styles/userProfile.css">
  <!-- print.css contains BOTH @media print rules (gated to print preview by the
       @media wrapper itself) AND html.pdf-export-mode class rules (applied when
       src/pdf.js toggles the class on <html> before native PDF capture). The
       file must be loaded WITHOUT media="print" so the class-based rules can
       fire during WKWebView's createPDF, which does not trigger print mode. -->
  <link rel="stylesheet" href="/styles/print.css">
  <!-- Liquid-glass / vibrancy overrides. Loaded LAST and fully gated behind
       :root[data-tauri="true"], so it is inert in a plain browser and only
       turns the chrome translucent inside the Tauri desktop shell. -->
  <link rel="stylesheet" href="/styles/glass.css">
</head>
<body>
  <div id="root"></div>
  <!-- Body-level portal target for Radix dropdowns/dialogs (frosted under Tauri). -->
  <div id="glass-portal"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
