name: guard-main-source

# Enforces that `main` only advances via promotions from this repo's `next` (so every stable
# release is a promotion of tested beta code). Infra/bootstrap PRs labeled
# `skip-build` are exempt — they don't cut a release, so they may target main
# directly. Make this a required status check on `main` AFTER it has run once.
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches: [main]

permissions:
  contents: read

jobs:
  only-next-into-main:
    runs-on: ubuntu-latest
    steps:
      - name: Reject PRs into main that are not this repo's next (unless skip-build)
        env:
          # GITHUB_HEAD_REF is the runner's built-in PR head-branch var (safe).
          # HEAD_REPO must equal BASE_REPO so a fork whose branch is also named
          # "next" cannot satisfy the gate — a promotion must come from THIS
          # repository's next branch, not just any branch called next.
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          echo "Head: ${HEAD_REPO}:${GITHUB_HEAD_REF}  Base: ${BASE_REPO}  Labels: ${LABELS:-<none>}"
          case ",${LABELS}," in
            *",skip-build,"*)
              echo "OK: skip-build infra PR may target main directly."
              exit 0
              ;;
          esac
          if [ "${HEAD_REPO}" = "${BASE_REPO}" ] && [ "${GITHUB_HEAD_REF}" = "next" ]; then
            echo "OK: promotion from ${BASE_REPO}'s next branch."
            exit 0
          fi
          echo "::error::PRs into main may only come from this repository's 'next' branch (or be labeled 'skip-build'). Got '${HEAD_REPO}:${GITHUB_HEAD_REF}'."
          exit 1
