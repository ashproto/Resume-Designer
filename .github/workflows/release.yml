name: Release Desktop App

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  prepare:
    permissions:
      contents: write
      models: read
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      previous_tag: ${{ steps.version.outputs.previous_tag }}
      notes_provider: ${{ steps.final_notes.outputs.provider }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compute release version
        id: version
        run: node resume-designer/scripts/ci/compute-version.mjs >> "$GITHUB_OUTPUT"

      - name: Generate baseline GitHub release notes
        uses: actions/github-script@v7
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          PREVIOUS_TAG: ${{ steps.version.outputs.previous_tag }}
        with:
          script: |
            const fs = require('node:fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.RELEASE_TAG;
            const previousTag = process.env.PREVIOUS_TAG;
            const params = {
              owner,
              repo,
              tag_name: tag,
              target_commitish: context.sha
            };

            if (previousTag) {
              params.previous_tag_name = previousTag;
            }

            const { data } = await github.rest.repos.generateReleaseNotes(params);
            const header = `# Resume Designer ${process.env.RELEASE_VERSION}\n\n`;
            fs.writeFileSync('release-notes-baseline.md', `${header}${(data.body || '').trim()}\n`);

      - name: Build AI prompt
        run: |
          {
            echo "Rewrite the following GitHub-generated release notes for end users of the Resume Designer desktop app."
            echo
            echo "Requirements:"
            echo "- Keep Markdown formatting."
            echo "- Be concise and user-facing."
            echo "- Keep sections in this order when relevant: Highlights, Improvements, Fixes."
            echo "- Do not include internal engineering details, branch names, or token/CI references."
            echo "- Preserve technical accuracy. If baseline notes are already clear, keep close wording."
            echo
            echo "Release version: ${{ steps.version.outputs.version }}"
            echo "Release tag: ${{ steps.version.outputs.tag }}"
            echo
            echo "Baseline notes start below:"
            echo
            cat release-notes-baseline.md
          } > release-notes-ai-prompt.txt

      - name: Rewrite notes with GitHub Models (optional)
        id: ai_notes
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node - <<'EOF'
          const fs = require('node:fs');

          async function main() {
            const prompt = fs.readFileSync('release-notes-ai-prompt.txt', 'utf8');
            const token = process.env.GITHUB_TOKEN;
            if (!token) {
              throw new Error('Missing GITHUB_TOKEN for GitHub Models request');
            }

            const response = await fetch('https://models.github.ai/inference/chat/completions', {
              method: 'POST',
              headers: {
                Authorization: `Bearer ${token}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                model: 'openai/gpt-5-mini',
                messages: [
                  {
                    role: 'system',
                    content: 'Rewrite release notes to be concise, user-facing, and accurate.'
                  },
                  { role: 'user', content: prompt }
                ]
              })
            });

            const data = await response.json();
            if (!response.ok) {
              throw new Error(`API error: ${response.status} ${JSON.stringify(data)}`);
            }

            const content = data?.choices?.[0]?.message?.content;
            const text = typeof content === 'string' ? content.trim() : '';
            if (!text) {
              throw new Error('No release-note content returned by GitHub Models');
            }

            fs.writeFileSync('release-notes-ai.md', `${text}\n`, 'utf8');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'response_file=release-notes-ai.md\n');
          }

          main().catch((error) => {
            console.error(error.message);
            process.exit(1);
          });
          EOF

      - name: Select final release notes
        id: final_notes
        env:
          AI_RESPONSE_FILE: ${{ steps.ai_notes.outputs.response_file }}
        run: |
          if [ -n "$AI_RESPONSE_FILE" ] && [ -s "$AI_RESPONSE_FILE" ]; then
            cp "$AI_RESPONSE_FILE" release-notes.md
            echo "provider=github-models" >> "$GITHUB_OUTPUT"
          else
            cp release-notes-baseline.md release-notes.md
            echo "provider=github" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload release notes artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: |
            release-notes.md
            release-notes-baseline.md

  build-macos:
    permissions:
      contents: read
    runs-on: macos-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            target: aarch64-apple-darwin
          - arch: x86_64
            target: x86_64-apple-darwin
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: resume-designer/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: resume-designer/src-tauri

      - name: Install dependencies
        run: npm ci
        working-directory: resume-designer

      - name: Apply CI release version
        working-directory: resume-designer
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          npm version "$VERSION" --no-git-tag-version
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(p,'utf8'));c.version=process.env.VERSION;fs.writeFileSync(p, JSON.stringify(c,null,2)+'\n');"
          node -e "const fs=require('fs');const p='src-tauri/Cargo.toml';let s=fs.readFileSync(p,'utf8');s=s.replace(/^version = \".*\"/m, 'version = \"'+process.env.VERSION+'\"');fs.writeFileSync(p, s);"

      - name: Validate macOS signing and notarization secrets
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          missing=()
          [ -z "$CSC_LINK" ] && missing+=("CSC_LINK")
          [ -z "$CSC_KEY_PASSWORD" ] && missing+=("CSC_KEY_PASSWORD")
          [ -z "$APPLE_ID" ] && missing+=("APPLE_ID")
          [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ] && missing+=("APPLE_APP_SPECIFIC_PASSWORD")
          [ -z "$APPLE_TEAM_ID" ] && missing+=("APPLE_TEAM_ID")
          [ -z "$APPLE_SIGNING_IDENTITY" ] && missing+=("APPLE_SIGNING_IDENTITY")
          [ -z "$TAURI_SIGNING_PRIVATE_KEY" ] && missing+=("TAURI_SIGNING_PRIVATE_KEY")
          [ -z "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" ] && missing+=("TAURI_SIGNING_PRIVATE_KEY_PASSWORD")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required macOS signing/notarization secrets: ${missing[*]}"
            echo "Set them in GitHub repo settings: Settings -> Secrets and variables -> Actions -> New repository secret."
            exit 1
          fi

          echo "macOS signing/notarization secrets are configured."

      - name: Build macOS artifacts (signed + notarized + updater bundle)
        uses: tauri-apps/tauri-action@v0
        env:
          APPLE_CERTIFICATE: ${{ secrets.CSC_LINK }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: resume-designer
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}

      - name: Normalize macOS artifact filenames
        shell: bash
        working-directory: resume-designer/src-tauri/target/${{ matrix.target }}/release/bundle
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          # Tauri emits "<productName>.app.tar.gz" without arch — collides
          # between matrix builds when both arms write to the same release-flat
          # dir. Also "Resume Designer" has a space, which GitHub rewrites to
          # "." in uploaded asset names, breaking latest.json's URL field.
          # Rename to a no-space arch-suffixed form; the latest.json regex
          # (aarch64.*\.app\.tar\.gz$ / x(86_)?64.*\.app\.tar\.gz$) still matches.
          cd macos
          mv "Resume Designer.app.tar.gz" "Resume-Designer_${ARCH}.app.tar.gz"
          mv "Resume Designer.app.tar.gz.sig" "Resume-Designer_${ARCH}.app.tar.gz.sig"
          cd ../dmg
          for f in *.dmg; do
            newname="${f// /-}"
            [ "$f" != "$newname" ] && mv "$f" "$newname"
          done

      - name: Upload macOS ${{ matrix.arch }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-${{ matrix.arch }}
          path: |
            resume-designer/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            resume-designer/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            resume-designer/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error

  build-windows:
    permissions:
      contents: read
    runs-on: windows-latest
    needs: prepare
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: resume-designer/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: resume-designer/src-tauri

      - name: Install dependencies
        run: npm ci
        working-directory: resume-designer

      - name: Apply CI release version
        working-directory: resume-designer
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          npm version "$VERSION" --no-git-tag-version
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(p,'utf8'));c.version=process.env.VERSION;fs.writeFileSync(p, JSON.stringify(c,null,2)+'\n');"
          node -e "const fs=require('fs');const p='src-tauri/Cargo.toml';let s=fs.readFileSync(p,'utf8');s=s.replace(/^version = \".*\"/m, 'version = \"'+process.env.VERSION+'\"');fs.writeFileSync(p, s);"

      - name: Pre-extract NSIS toolset for Tauri (workaround)
        # Tauri 2.11.2's bundler downloads nsis-3.11.zip and extracts it with
        # its own Rust unzip, but mishandles the "Contrib\Language files" path
        # (note the space) on Windows runners — the language-files dir ends
        # up missing or incomplete, so makensis later fails with:
        #   "Can't open language file - en-US.nlf"
        #
        # PowerShell's Expand-Archive handles spaces correctly. We pre-extract
        # the same zip Tauri would download into Tauri's expected cache
        # location; per the bundler source, if the dir already exists with
        # valid files, Tauri skips its own download/extract step.
        #
        # The zip ships everything under a top-level `nsis-3.11/` dir; Tauri
        # expects the contents directly under `LOCALAPPDATA\tauri\NSIS\`, so
        # we extract to a temp dir and copy the inner `nsis-3.11/` contents
        # up one level.
        shell: powershell
        run: |
          $nsisDir = "$env:LOCALAPPDATA\tauri\NSIS"
          if (Test-Path $nsisDir) {
            Remove-Item -Path $nsisDir -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $nsisDir | Out-Null

          $zipPath = "$env:RUNNER_TEMP\nsis-3.11.zip"
          $stageDir = "$env:RUNNER_TEMP\nsis-staging"
          if (Test-Path $stageDir) {
            Remove-Item -Path $stageDir -Recurse -Force
          }

          Invoke-WebRequest -Uri "https://github.com/tauri-apps/binary-releases/releases/download/nsis-3.11/nsis-3.11.zip" -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $stageDir -Force

          # The zip's top-level dir name (nsis-3.11/) needs stripping; copy
          # its contents into Tauri's expected cache root.
          $inner = "$stageDir\nsis-3.11"
          if (-not (Test-Path $inner)) {
            Write-Error "NSIS pre-extract failed: expected $inner after Expand-Archive"
            Write-Host "Staging contents:"
            Get-ChildItem $stageDir -Recurse | Select-Object -First 30 FullName
            exit 1
          }
          Copy-Item -Path "$inner\*" -Destination $nsisDir -Recurse -Force

          # Sanity check: language-files dir must contain English.nlf —
          # Tauri's en-US.nlf is written here at bundle time.
          $langFile = "$nsisDir\Contrib\Language files\English.nlf"
          if (-not (Test-Path $langFile)) {
            Write-Error "NSIS pre-extract failed: $langFile is missing"
            Write-Host "Contents of ${nsisDir}:"
            Get-ChildItem $nsisDir -Recurse | Select-Object -First 30 FullName
            exit 1
          }
          Write-Host "NSIS toolset pre-extracted to $nsisDir"

      - name: Build Windows artifacts (updater bundle, unsigned exe)
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: resume-designer
          tauriScript: npx tauri
          args: --bundles nsis

      - name: Normalize Windows artifact filenames
        shell: bash
        working-directory: resume-designer/src-tauri/target/release/bundle/nsis
        run: |
          set -euo pipefail
          # GitHub rewrites spaces in asset names to ".", which would break
          # latest.json's URL field. Strip spaces from all NSIS outputs so the
          # uploaded asset name matches what the manifest references.
          for f in *.exe *.nsis.zip *.nsis.zip.sig; do
            [ -f "$f" ] || continue
            newname="${f// /-}"
            [ "$f" != "$newname" ] && mv "$f" "$newname"
          done

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            resume-designer/src-tauri/target/release/bundle/nsis/*.exe
            resume-designer/src-tauri/target/release/bundle/nsis/*.nsis.zip
            resume-designer/src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
          if-no-files-found: error

  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-macos
      - build-windows
    steps:
      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: .

      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-macos-aarch64
          path: release-assets/macos-aarch64

      - name: Download macOS x86_64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-macos-x86_64
          path: release-assets/macos-x86_64

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: release-assets/windows

      - name: Flatten assets and assemble latest.json
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
          REPO_FULL: ${{ github.repository }}
        run: |
          node - <<'EOF'
          const fs = require('node:fs');
          const path = require('node:path');

          const root = 'release-assets';
          const flatDir = 'release-flat';
          fs.mkdirSync(flatDir, { recursive: true });

          function walk(dir) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) walk(full);
              else fs.copyFileSync(full, path.join(flatDir, entry.name));
            }
          }
          walk(root);

          const files = fs.readdirSync(flatDir);
          // Surface Tauri's actual artifact names so first-build regex failures
          // are diagnosable in the Actions log without needing a re-run.
          console.log('release-flat contents:', files.join(', '));
          function findOne(pattern) {
            const m = files.filter((f) => pattern.test(f));
            if (m.length === 0) throw new Error(`No file matched ${pattern}`);
            if (m.length > 1) throw new Error(`Multiple files matched ${pattern}: ${m.join(', ')}`);
            return m[0];
          }
          function readSig(file) {
            return fs.readFileSync(path.join(flatDir, file), 'utf8').trim();
          }

          const tag = process.env.TAG;
          // github.repository is "owner/repo" — well-formed by GitHub's naming rules.
          const baseUrl = `https://github.com/${process.env.REPO_FULL}/releases/download/${tag}`;

          const macArmArchive = findOne(/aarch64.*\.app\.tar\.gz$/);
          const macArmSig = findOne(/aarch64.*\.app\.tar\.gz\.sig$/);
          const macIntelArchive = findOne(/x(86_)?64.*\.app\.tar\.gz$/);
          const macIntelSig = findOne(/x(86_)?64.*\.app\.tar\.gz\.sig$/);
          const winArchive = findOne(/\.nsis\.zip$/);
          const winSig = findOne(/\.nsis\.zip\.sig$/);

          const manifest = {
            version: process.env.VERSION,
            notes: fs.readFileSync('release-notes.md', 'utf8'),
            pub_date: new Date().toISOString(),
            platforms: {
              'darwin-aarch64': {
                signature: readSig(macArmSig),
                url: `${baseUrl}/${macArmArchive}`,
              },
              'darwin-x86_64': {
                signature: readSig(macIntelSig),
                url: `${baseUrl}/${macIntelArchive}`,
              },
              'windows-x86_64': {
                signature: readSig(winSig),
                url: `${baseUrl}/${winArchive}`,
              },
            },
          };

          fs.writeFileSync(path.join(flatDir, 'latest.json'), JSON.stringify(manifest, null, 2));

          for (const [platform, entry] of Object.entries(manifest.platforms)) {
            const expected = entry.url.split('/').pop();
            if (!fs.existsSync(path.join(flatDir, expected))) {
              console.error(`latest.json references missing asset for ${platform}: ${expected}`);
              process.exit(1);
            }
          }

          console.log('Assembled latest.json with platforms:', Object.keys(manifest.platforms).join(', '));
          EOF

      - name: Remove existing release assets for tag
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.RELEASE_TAG;

            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag
              });

              for (const asset of release.assets) {
                core.info(`Deleting existing asset: ${asset.name}`);
                await github.rest.repos.deleteReleaseAsset({
                  owner,
                  repo,
                  asset_id: asset.id
                });
              }
            } catch (error) {
              if (error.status === 404) {
                core.info(`No existing release found for tag ${tag}; skipping cleanup.`);
              } else {
                throw error;
              }
            }

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Resume Designer ${{ needs.prepare.outputs.version }}
          body_path: release-notes.md
          files: |
            release-flat/*.dmg
            release-flat/*.app.tar.gz
            release-flat/*.app.tar.gz.sig
            release-flat/*.exe
            release-flat/*.nsis.zip
            release-flat/*.nsis.zip.sig
            release-flat/latest.json
          fail_on_unmatched_files: true
          overwrite_files: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
