name: Release Desktop App

on:
  push:
    branches: [main, next]
  workflow_dispatch:
    inputs:
      version:
        description: "Override the computed version (optional, e.g. 1.10.0)"
        required: false

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  decide:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      skip: ${{ steps.gate.outputs.skip }}
      channel: ${{ steps.ver.outputs.channel }}
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
      previous_tag: ${{ steps.ver.outputs.previous_tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so compute-version sees v* tags

      - name: Skip build when the merged PR is labeled skip-build
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          skip=false
          if [ "${{ github.event_name }}" = "push" ]; then
            labels=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
              --jq '[.[].labels[].name] | unique | join(",")' 2>/dev/null || echo "")
            echo "Associated PR labels: ${labels:-<none>}"
            case ",$labels," in
              *",skip-build,"*) skip=true ;;
            esac
          fi
          echo "skip=$skip" >> "$GITHUB_OUTPUT"
          echo "Decision: skip=$skip"

      - name: Compute version and channel
        id: ver
        if: steps.gate.outputs.skip != 'true'
        env:
          # push to next -> beta channel; anything else -> stable
          RELEASE_CHANNEL: ${{ github.ref_name == 'next' && 'next' || 'stable' }}
          RELEASE_VERSION_OVERRIDE: ${{ github.event.inputs.version }}
        run: node resume-designer/scripts/ci/compute-version.mjs >> "$GITHUB_OUTPUT"

  build-macos:
    permissions:
      contents: read
    runs-on: macos-latest
    needs: decide
    if: ${{ needs.decide.outputs.skip != 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            target: aarch64-apple-darwin
          - arch: x86_64
            target: x86_64-apple-darwin
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: resume-designer/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: resume-designer/src-tauri

      - name: Install dependencies
        run: npm ci
        working-directory: resume-designer

      - name: Apply CI release version
        working-directory: resume-designer
        env:
          VERSION: ${{ needs.decide.outputs.version }}
        run: |
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(p,'utf8'));c.version=process.env.VERSION;fs.writeFileSync(p, JSON.stringify(c,null,2)+'\n');"
          node -e "const fs=require('fs');const p='src-tauri/Cargo.toml';let s=fs.readFileSync(p,'utf8');s=s.replace(/^version = \".*\"/m, 'version = \"'+process.env.VERSION+'\"');fs.writeFileSync(p, s);"

      - name: Point updater at the beta endpoint (next channel only)
        if: ${{ needs.decide.outputs.channel == 'next' }}
        working-directory: resume-designer
        env:
          REPO: ${{ github.repository }}
        run: |
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(p,'utf8'));c.plugins.updater.endpoints=['https://github.com/'+process.env.REPO+'/releases/download/next/latest.json'];fs.writeFileSync(p, JSON.stringify(c,null,2)+'\n');"

      - name: Validate macOS signing and notarization secrets
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          missing=()
          [ -z "$CSC_LINK" ] && missing+=("CSC_LINK")
          [ -z "$CSC_KEY_PASSWORD" ] && missing+=("CSC_KEY_PASSWORD")
          [ -z "$APPLE_ID" ] && missing+=("APPLE_ID")
          [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ] && missing+=("APPLE_APP_SPECIFIC_PASSWORD")
          [ -z "$APPLE_TEAM_ID" ] && missing+=("APPLE_TEAM_ID")
          [ -z "$APPLE_SIGNING_IDENTITY" ] && missing+=("APPLE_SIGNING_IDENTITY")
          [ -z "$TAURI_SIGNING_PRIVATE_KEY" ] && missing+=("TAURI_SIGNING_PRIVATE_KEY")
          [ -z "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" ] && missing+=("TAURI_SIGNING_PRIVATE_KEY_PASSWORD")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required macOS signing/notarization secrets: ${missing[*]}"
            echo "Set them in GitHub repo settings: Settings -> Secrets and variables -> Actions -> New repository secret."
            exit 1
          fi

          echo "macOS signing/notarization secrets are configured."

      - name: Build macOS artifacts (signed + notarized + updater bundle)
        uses: tauri-apps/tauri-action@v0
        env:
          APPLE_CERTIFICATE: ${{ secrets.CSC_LINK }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: resume-designer
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}

      - name: Normalize macOS artifact filenames
        shell: bash
        working-directory: resume-designer/src-tauri/target/${{ matrix.target }}/release/bundle
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          # Tauri emits "<productName>.app.tar.gz" without arch — collides
          # between matrix builds when both arms write to the same release-flat
          # dir. Also "Resume Designer" has a space, which GitHub rewrites to
          # "." in uploaded asset names, breaking latest.json's URL field.
          # Rename to a no-space arch-suffixed form; the latest.json regex
          # (aarch64.*\.app\.tar\.gz$ / x(86_)?64.*\.app\.tar\.gz$) still matches.
          cd macos
          mv "Resume Designer.app.tar.gz" "Resume-Designer_${ARCH}.app.tar.gz"
          mv "Resume Designer.app.tar.gz.sig" "Resume-Designer_${ARCH}.app.tar.gz.sig"
          cd ../dmg
          for f in *.dmg; do
            newname="${f// /-}"
            [ "$f" != "$newname" ] && mv "$f" "$newname"
          done

      - name: Upload macOS ${{ matrix.arch }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-${{ matrix.arch }}
          path: |
            resume-designer/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            resume-designer/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            resume-designer/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error

  build-windows:
    permissions:
      contents: read
    runs-on: windows-latest
    needs: decide
    if: ${{ needs.decide.outputs.skip != 'true' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: resume-designer/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: resume-designer/src-tauri

      - name: Install dependencies
        run: npm ci
        working-directory: resume-designer

      - name: Apply CI release version
        working-directory: resume-designer
        shell: bash
        env:
          VERSION: ${{ needs.decide.outputs.version }}
        run: |
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(p,'utf8'));c.version=process.env.VERSION;fs.writeFileSync(p, JSON.stringify(c,null,2)+'\n');"
          node -e "const fs=require('fs');const p='src-tauri/Cargo.toml';let s=fs.readFileSync(p,'utf8');s=s.replace(/^version = \".*\"/m, 'version = \"'+process.env.VERSION+'\"');fs.writeFileSync(p, s);"

      - name: Point updater at the beta endpoint (next channel only)
        if: ${{ needs.decide.outputs.channel == 'next' }}
        working-directory: resume-designer
        shell: bash
        env:
          REPO: ${{ github.repository }}
        run: |
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(p,'utf8'));c.plugins.updater.endpoints=['https://github.com/'+process.env.REPO+'/releases/download/next/latest.json'];fs.writeFileSync(p, JSON.stringify(c,null,2)+'\n');"

      - name: Build Windows artifacts (updater bundle, unsigned exe)
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: resume-designer
          tauriScript: npx tauri
          args: --bundles nsis

      - name: Normalize Windows artifact filenames
        shell: bash
        working-directory: resume-designer/src-tauri/target/release/bundle/nsis
        run: |
          set -euo pipefail
          # GitHub rewrites spaces in asset names to ".", which would break
          # latest.json's URL field. Strip spaces from the v2 updater outputs
          # (.exe + .exe.sig) so the uploaded asset names match what the
          # manifest references. With createUpdaterArtifacts=true Tauri 2
          # produces v2 format: .exe is the installer/updater payload,
          # .exe.sig is its detached signature — no .nsis.zip is emitted.
          for f in *.exe *.exe.sig; do
            [ -f "$f" ] || continue
            newname="${f// /-}"
            [ "$f" != "$newname" ] && mv "$f" "$newname"
          done

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            resume-designer/src-tauri/target/release/bundle/nsis/*.exe
            resume-designer/src-tauri/target/release/bundle/nsis/*.exe.sig
          if-no-files-found: error

  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs:
      - decide
      - build-macos
      - build-windows
    if: ${{ needs.decide.outputs.skip != 'true' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # history + tags so release notes can diff from previous_tag

      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-macos-aarch64
          path: release-assets/macos-aarch64

      - name: Download macOS x86_64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-macos-x86_64
          path: release-assets/macos-x86_64

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: release-assets/windows

      - name: Generate release notes
        env:
          PREV_TAG: ${{ needs.decide.outputs.previous_tag }}
          VERSION: ${{ needs.decide.outputs.version }}
        run: |
          range="HEAD"
          [ -n "$PREV_TAG" ] && range="${PREV_TAG}..HEAD"
          {
            echo "## Resume Designer $VERSION"
            echo ""
            git log "$range" --no-merges --pretty=format:'- %s' \
              | grep -E '^- (feat|fix|perf)(\(|:|!)' \
              || echo "- Maintenance and internal improvements."
            echo ""
          } > release-notes.md
          echo "----- release-notes.md -----"
          cat release-notes.md

      - name: Flatten assets and assemble latest.json
        env:
          VERSION: ${{ needs.decide.outputs.version }}
          TAG: ${{ needs.decide.outputs.tag }}
          REPO_FULL: ${{ github.repository }}
        run: |
          node - <<'EOF'
          const fs = require('node:fs');
          const path = require('node:path');

          const root = 'release-assets';
          const flatDir = 'release-flat';
          fs.mkdirSync(flatDir, { recursive: true });

          function walk(dir) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) walk(full);
              else fs.copyFileSync(full, path.join(flatDir, entry.name));
            }
          }
          walk(root);

          const files = fs.readdirSync(flatDir);
          // Surface Tauri's actual artifact names so first-build regex failures
          // are diagnosable in the Actions log without needing a re-run.
          console.log('release-flat contents:', files.join(', '));
          function findOne(pattern) {
            const m = files.filter((f) => pattern.test(f));
            if (m.length === 0) throw new Error(`No file matched ${pattern}`);
            if (m.length > 1) throw new Error(`Multiple files matched ${pattern}: ${m.join(', ')}`);
            return m[0];
          }
          function readSig(file) {
            return fs.readFileSync(path.join(flatDir, file), 'utf8').trim();
          }

          const tag = process.env.TAG;
          // github.repository is "owner/repo" — well-formed by GitHub's naming rules.
          const baseUrl = `https://github.com/${process.env.REPO_FULL}/releases/download/${tag}`;

          const macArmArchive = findOne(/aarch64.*\.app\.tar\.gz$/);
          const macArmSig = findOne(/aarch64.*\.app\.tar\.gz\.sig$/);
          const macIntelArchive = findOne(/x(86_)?64.*\.app\.tar\.gz$/);
          const macIntelSig = findOne(/x(86_)?64.*\.app\.tar\.gz\.sig$/);
          // v2 updater format on Windows: the .exe IS the updater payload
          // and the .exe.sig is the detached signature. Anchor on
          // `setup.exe` so we don't accidentally pick up some unrelated
          // .exe; macOS arches go through .dmg / .app.tar.gz, so there's no
          // cross-platform collision here.
          const winArchive = findOne(/setup\.exe$/);
          const winSig = findOne(/setup\.exe\.sig$/);

          const manifest = {
            version: process.env.VERSION,
            notes: fs.readFileSync('release-notes.md', 'utf8'),
            pub_date: new Date().toISOString(),
            platforms: {
              'darwin-aarch64': {
                signature: readSig(macArmSig),
                url: `${baseUrl}/${macArmArchive}`,
              },
              'darwin-x86_64': {
                signature: readSig(macIntelSig),
                url: `${baseUrl}/${macIntelArchive}`,
              },
              'windows-x86_64': {
                signature: readSig(winSig),
                url: `${baseUrl}/${winArchive}`,
              },
            },
          };

          fs.writeFileSync(path.join(flatDir, 'latest.json'), JSON.stringify(manifest, null, 2));

          for (const [platform, entry] of Object.entries(manifest.platforms)) {
            const expected = entry.url.split('/').pop();
            if (!fs.existsSync(path.join(flatDir, expected))) {
              console.error(`latest.json references missing asset for ${platform}: ${expected}`);
              process.exit(1);
            }
          }

          console.log('Assembled latest.json with platforms:', Object.keys(manifest.platforms).join(', '));
          EOF

      - name: Remove existing release assets for tag
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ needs.decide.outputs.tag }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.RELEASE_TAG;

            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag
              });

              for (const asset of release.assets) {
                core.info(`Deleting existing asset: ${asset.name}`);
                await github.rest.repos.deleteReleaseAsset({
                  owner,
                  repo,
                  asset_id: asset.id
                });
              }
            } catch (error) {
              if (error.status === 404) {
                core.info(`No existing release found for tag ${tag}; skipping cleanup.`);
              } else {
                throw error;
              }
            }

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.decide.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.decide.outputs.channel == 'next' && 'Resume Designer (beta)' || format('Resume Designer {0}', needs.decide.outputs.version) }}
          body_path: release-notes.md
          prerelease: ${{ needs.decide.outputs.channel == 'next' }}
          make_latest: ${{ needs.decide.outputs.channel != 'next' }}
          generate_release_notes: ${{ needs.decide.outputs.channel != 'next' }}
          files: |
            release-flat/*.dmg
            release-flat/*.app.tar.gz
            release-flat/*.app.tar.gz.sig
            release-flat/*.exe
            release-flat/*.exe.sig
            release-flat/latest.json
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
