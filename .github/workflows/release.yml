name: Release Desktop App

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  prepare:
    permissions:
      contents: write
      models: read
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      previous_tag: ${{ steps.version.outputs.previous_tag }}
      notes_provider: ${{ steps.final_notes.outputs.provider }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compute release version
        id: version
        run: node resume-designer/scripts/ci/compute-version.mjs >> "$GITHUB_OUTPUT"

      - name: Generate baseline GitHub release notes
        uses: actions/github-script@v7
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          PREVIOUS_TAG: ${{ steps.version.outputs.previous_tag }}
        with:
          script: |
            const fs = require('node:fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.RELEASE_TAG;
            const previousTag = process.env.PREVIOUS_TAG;
            const params = {
              owner,
              repo,
              tag_name: tag,
              target_commitish: context.sha
            };

            if (previousTag) {
              params.previous_tag_name = previousTag;
            }

            const { data } = await github.rest.repos.generateReleaseNotes(params);
            const header = `# Resume Designer ${process.env.RELEASE_VERSION}\n\n`;
            fs.writeFileSync('release-notes-baseline.md', `${header}${(data.body || '').trim()}\n`);

      - name: Build AI prompt
        run: |
          {
            echo "Rewrite the following GitHub-generated release notes for end users of the Resume Designer desktop app."
            echo
            echo "Requirements:"
            echo "- Keep Markdown formatting."
            echo "- Be concise and user-facing."
            echo "- Keep sections in this order when relevant: Highlights, Improvements, Fixes."
            echo "- Do not include internal engineering details, branch names, or token/CI references."
            echo "- Preserve technical accuracy. If baseline notes are already clear, keep close wording."
            echo
            echo "Release version: ${{ steps.version.outputs.version }}"
            echo "Release tag: ${{ steps.version.outputs.tag }}"
            echo
            echo "Baseline notes start below:"
            echo
            cat release-notes-baseline.md
          } > release-notes-ai-prompt.txt

      - name: Rewrite notes with GitHub Models (optional)
        id: ai_notes
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node - <<'EOF'
          const fs = require('node:fs');

          async function main() {
            const prompt = fs.readFileSync('release-notes-ai-prompt.txt', 'utf8');
            const token = process.env.GITHUB_TOKEN;
            if (!token) {
              throw new Error('Missing GITHUB_TOKEN for GitHub Models request');
            }

            const response = await fetch('https://models.github.ai/inference/chat/completions', {
              method: 'POST',
              headers: {
                Authorization: `Bearer ${token}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                model: 'openai/gpt-5-mini',
                messages: [
                  {
                    role: 'system',
                    content: 'Rewrite release notes to be concise, user-facing, and accurate.'
                  },
                  { role: 'user', content: prompt }
                ]
              })
            });

            const data = await response.json();
            if (!response.ok) {
              throw new Error(`API error: ${response.status} ${JSON.stringify(data)}`);
            }

            const content = data?.choices?.[0]?.message?.content;
            const text = typeof content === 'string' ? content.trim() : '';
            if (!text) {
              throw new Error('No release-note content returned by GitHub Models');
            }

            fs.writeFileSync('release-notes-ai.md', `${text}\n`, 'utf8');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'response_file=release-notes-ai.md\n');
          }

          main().catch((error) => {
            console.error(error.message);
            process.exit(1);
          });
          EOF

      - name: Select final release notes
        id: final_notes
        env:
          AI_RESPONSE_FILE: ${{ steps.ai_notes.outputs.response_file }}
        run: |
          if [ -n "$AI_RESPONSE_FILE" ] && [ -s "$AI_RESPONSE_FILE" ]; then
            cp "$AI_RESPONSE_FILE" release-notes.md
            echo "provider=github-models" >> "$GITHUB_OUTPUT"
          else
            cp release-notes-baseline.md release-notes.md
            echo "provider=github" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload release notes artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: |
            release-notes.md
            release-notes-baseline.md

  build-macos:
    permissions:
      contents: read
    runs-on: macos-latest
    needs: prepare
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: resume-designer/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: resume-designer

      - name: Apply CI release version
        run: npm version "${{ needs.prepare.outputs.version }}" --no-git-tag-version
        working-directory: resume-designer

      - name: Validate macOS signing and notarization secrets
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=()
          [ -z "$CSC_LINK" ] && missing+=("CSC_LINK")
          [ -z "$CSC_KEY_PASSWORD" ] && missing+=("CSC_KEY_PASSWORD")
          [ -z "$APPLE_ID" ] && missing+=("APPLE_ID")
          [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ] && missing+=("APPLE_APP_SPECIFIC_PASSWORD")
          [ -z "$APPLE_TEAM_ID" ] && missing+=("APPLE_TEAM_ID")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required macOS signing/notarization secrets: ${missing[*]}"
            echo "Set them in GitHub repo settings: Settings -> Secrets and variables -> Actions -> New repository secret."
            exit 1
          fi

          echo "macOS signing/notarization secrets are configured."

      - name: Build macOS artifacts
        run: npm run build && npx electron-builder --mac --publish never
        working-directory: resume-designer
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Validate macOS update manifest asset paths
        run: |
          node - <<'EOF'
          const fs = require('node:fs');
          const path = require('node:path');

          const releaseDir = path.resolve('resume-designer/release');
          const manifestPath = path.join(releaseDir, 'latest-mac.yml');
          const manifest = fs.readFileSync(manifestPath, 'utf8');

          const requiredAssets = new Set();
          for (const line of manifest.split(/\r?\n/)) {
            const match = line.match(/^\s*(?:url|path):\s*(.+?)\s*$/);
            if (!match) {
              continue;
            }
            const value = match[1].trim().replace(/^['"]|['"]$/g, '');
            if (!value || /^https?:\/\//i.test(value)) {
              continue;
            }
            requiredAssets.add(value);
          }

          const missing = [...requiredAssets].filter((fileName) => !fs.existsSync(path.join(releaseDir, fileName)));
          if (missing.length > 0) {
            console.error('latest-mac.yml references missing assets:');
            for (const fileName of missing) {
              console.error(`- ${fileName}`);
            }
            process.exit(1);
          }
          EOF

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            resume-designer/release/*.dmg
            resume-designer/release/*.zip
            resume-designer/release/*.zip.blockmap
            resume-designer/release/latest-mac.yml
          if-no-files-found: error

  build-windows:
    permissions:
      contents: read
    runs-on: windows-latest
    needs: prepare
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: resume-designer/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: resume-designer

      - name: Apply CI release version
        run: npm version "${{ needs.prepare.outputs.version }}" --no-git-tag-version
        working-directory: resume-designer

      - name: Build Windows artifacts
        run: npm run build && npx electron-builder --win nsis --publish never
        working-directory: resume-designer

      - name: Validate Windows update manifest asset paths
        shell: bash
        run: |
          node - <<'EOF'
          const fs = require('node:fs');
          const path = require('node:path');

          const releaseDir = path.resolve('resume-designer/release');
          const manifestPath = path.join(releaseDir, 'latest.yml');
          const manifest = fs.readFileSync(manifestPath, 'utf8');

          const requiredAssets = new Set();
          for (const line of manifest.split(/\r?\n/)) {
            const match = line.match(/^\s*(?:url|path):\s*(.+?)\s*$/);
            if (!match) {
              continue;
            }
            const value = match[1].trim().replace(/^['"]|['"]$/g, '');
            if (!value || /^https?:\/\//i.test(value)) {
              continue;
            }
            requiredAssets.add(value);
          }

          const missing = [...requiredAssets].filter((fileName) => !fs.existsSync(path.join(releaseDir, fileName)));
          if (missing.length > 0) {
            console.error('latest.yml references missing assets:');
            for (const fileName of missing) {
              console.error(`- ${fileName}`);
            }
            process.exit(1);
          }
          EOF

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            resume-designer/release/*Setup*.exe
            resume-designer/release/*Setup*.exe.blockmap
            resume-designer/release/latest.yml
          if-no-files-found: error

  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-macos
      - build-windows
    steps:
      - name: Download release notes artifact
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: .

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-macos
          path: release-assets/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: release-assets/windows

      - name: Remove existing release assets for tag
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.RELEASE_TAG;

            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag
              });

              for (const asset of release.assets) {
                core.info(`Deleting existing asset: ${asset.name}`);
                await github.rest.repos.deleteReleaseAsset({
                  owner,
                  repo,
                  asset_id: asset.id
                });
              }
            } catch (error) {
              if (error.status === 404) {
                core.info(`No existing release found for tag ${tag}; skipping cleanup.`);
              } else {
                throw error;
              }
            }

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Resume Designer ${{ needs.prepare.outputs.version }}
          body_path: release-notes.md
          files: |
            release-assets/macos/**/*.dmg
            release-assets/macos/**/*.zip
            release-assets/macos/**/*.zip.blockmap
            release-assets/macos/**/latest-mac.yml
            release-assets/windows/**/*Setup*.exe
            release-assets/windows/**/*Setup*.exe.blockmap
            release-assets/windows/**/latest.yml
          fail_on_unmatched_files: true
          overwrite_files: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
